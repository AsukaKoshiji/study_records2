name: CI

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main]

jobs:
  # 🐍 Backend（FastAPI + pytest）
  backend-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: learning_records
          MYSQL_USER: learning_user
          MYSQL_PASSWORD: learning_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ulearning_user -plearning_pass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 📦 依存関係インストール（rootのrequirements.txt）
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 🧪 テスト実行
      - name: Run Pytest
        env:
          DATABASE_URL: mysql+pymysql://learning_user:learning_pass@127.0.0.1:3306/learning_records
        run: |
          pytest tests


  # ⬢ Frontend（Next.js）
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # 📦 frontend依存関係
      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      # 🧹 lint（まずはこれで安定運用）
      - name: Run Lint
        env:
          CI: true
        run: |
          cd frontend
          npm run lint