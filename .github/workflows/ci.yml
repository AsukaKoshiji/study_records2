name: CI

on:
  push:
    branches: [ main, "feature/*" ]
  pull_request:
    branches: [ main ]

jobs:
  # 🐍 バックエンド（FastAPI）の自動テスト
  backend-test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: learning_records
          MYSQL_USER: learning_user
          MYSQL_PASSWORD: learning_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ulearning_user -plearning_pass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        env:
          DATABASE_URL: mysql+pymysql://learning_user:learning_pass@127.0.0.1:3306/learning_records
        run: |
          pytest

  # ⬢ フロントエンド（Next.js）の自動テスト
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Jest
        # 🌟 CI=true を環境変数に渡すことで、Jestが「1回だけ実行して終了するモード」になり、CIが途中で止まらなくなります
        env:
          CI: true
        run: |
          cd frontend
          npm test